id: travel_planning_001
category: travel_planning
prompt: "Plan a two-day San Francisco itinerary for a first-time visitor who likes food and walking. Cite current sources."
description: "Travel planning with live sources."
expected_outcomes: ["two-day", "San Francisco", "food"]
expected_tool_calls:
  - tool: web_search
    min_calls: 1
  - tool: fetch_url
    min_calls: 1
reference_citations:
