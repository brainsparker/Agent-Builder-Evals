id: company_research_001
category: company_research
prompt: "Research Vercel's current positioning and provide a concise company snapshot with cited sources."
description: "Company snapshot from live web sources."
expected_outcomes: ["Vercel positioning", "product or platform", "recent source"]
expected_tool_calls:
  - tool: web_search
    min_calls: 1
  - tool: fetch_url
    min_calls: 1
reference_citations:
  - claim: "Vercel company information"
    must_cite_domain: "vercel.com"
allowed_tools: ["web_search", "fetch_url"]
scoring: {pass_threshold: 0.7}
timeout_s: 120
max_tool_calls: 6
